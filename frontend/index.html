<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="Download YouTube video transcripts (VTT, SRT, TXT, JSON) and turn them into structured markdown with AI."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>YouTube Transcripts</title>
    <script>
      // Apply theme synchronously to avoid a flash of the wrong theme
      (function () {
        try {
          var v = localStorage.getItem("yt-transcript-theme");
          if (v === "light" || v === "dark") {
            document.documentElement.setAttribute("data-theme", v);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
